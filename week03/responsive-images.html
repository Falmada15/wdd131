<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Images</title>

    <link rel="stylesheet" href="styles/responsive-images.css">
</head>
<body>

<header>
    <h1>Responsive Images Example</h1>
</header>

<main>
    <div class="hero">
        <picture>
            <!-- Large screen -->
            <source srcset="images/hero-large.webp" media="(min-width: 1000px)">

            <!-- Medium screen -->
            <source srcset="images/hero-medium.webp" media="(min-width: 500px)">

            <!-- Default image -->
            <img 
                src="images/hero-small.webp" 
                alt="Temple landscape view" 
                width="1500" 
                height="750"
            >
        </picture>
    </div>
</main>

<footer>
    <p>&copy; 2026 WDD 131</p>
</footer>

</body>
</html>
